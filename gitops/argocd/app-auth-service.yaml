apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service
  namespace: argocd
spec:
  project: techchallenge
  source:
    repoURL: 'https://github.com/SEU_USUARIO/SEU_REPO.git'
    targetRevision: main
    path: gitops/apps/auth-service
  destination:
    server: https://kubernetes.default.svc
    namespace: techchallenge
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true